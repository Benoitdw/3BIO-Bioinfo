# Hugo configuration for GitHub Pages deployment
# This file will be copied over hugo.toml during GitHub Actions build
# The baseURL will be automatically set by GitHub Actions

languageCode = "en-us"
title = "3BIO-BioInfo Laboratory"
theme = "bioinfo-clean"

[params]
  description = "Computational Biology and Bioinformatics Research Lab"
  lab_name = "3BIO-BioInfo"
  institution = "Université Libre de Bruxelles (ULB)"
  institute = "ULB-VUB (IB)² Interuniversity Institute of Bioinformatics"
  location = "Campus Solbosch, Building U"

  # Contact
  email = "marianne.rooman@ulb.be"
  phone = "+32 (0)2 650 20 67"

  # Social
  github = ""
  twitter = ""
  linkedin = ""

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "Research"
    url = "/research/"
    weight = 2

  [[menu.main]]
    name = "Team"
    url = "/team/"
    weight = 3

  [[menu.main]]
    name = "Publications"
    url = "/publications/"
    weight = 4

  [[menu.main]]
    name = "Software"
    url = "/software/"
    weight = 5

  [[menu.main]]
    name = "Opportunities"
    url = "/opportunities/"
    weight = 6

  [[menu.main]]
    name = "Teaching"
    url = "/teaching/"
    weight = 7

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

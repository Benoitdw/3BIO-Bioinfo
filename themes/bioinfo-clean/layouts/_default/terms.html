{{ define "main" }}
<h1>{{ .Title }}</h1>

{{ .Content }}

<div class="project-list">
    {{ range .Data.Terms.ByCount }}
    <div class="project">
        <h3><a href="{{ .Page.Permalink }}">{{ .Page.Title }}</a></h3>
        <p>{{ .Count }} {{ if eq .Count 1 }}item{{ else }}items{{ end }}</p>
    </div>
    {{ end }}
</div>

{{ end }}

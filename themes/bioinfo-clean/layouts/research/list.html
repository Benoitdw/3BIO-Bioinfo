{{ define "main" }}
<h1>{{ .Title }}</h1>

{{ .Content }}

<div class="project-list">
    {{ range .Pages }}
    <div class="project">
        <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
        <p>{{ .Summary }}</p>
        <a href="{{ .Permalink }}">Read more &rarr;</a>
    </div>
    {{ end }}
</div>

{{ end }}

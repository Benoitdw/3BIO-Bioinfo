{{ define "main" }}
<h1>{{ .Title }}</h1>

{{ .Content }}

<div class="project-list">
    {{ range .Pages }}
    <div class="project">
        <div class="project-image">
            <!-- Dynamic protein visualization placeholder -->
            <svg width="100%" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    {{ $colors := slice "#667eea,#764ba2" "#4facfe,#00f2fe" "#fa709a,#fee140" "#30cfd0,#330867" "#a8edea,#fed6e3" }}
                    {{ $index := 0 }}
                    {{ if .File }}{{ $index = mod (len .File.Path) (len $colors) }}{{ end }}
                    {{ $colorPair := index $colors $index }}
                    {{ $colorArray := split $colorPair "," }}
                    <linearGradient id="grad{{ .Title | urlize }}" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:{{ index $colorArray 0 }};stop-opacity:1" />
                        <stop offset="100%" style="stop-color:{{ index $colorArray 1 }};stop-opacity:1" />
                    </linearGradient>
                </defs>
                <rect width="400" height="200" fill="url(#grad{{ .Title | urlize }})"/>

                <!-- Abstract protein/DNA helix visualization -->
                <g opacity="0.4">
                    <!-- Protein structure representation -->
                    <circle cx="80" cy="100" r="25" fill="white" opacity="0.8"/>
                    <circle cx="140" cy="70" r="20" fill="white" opacity="0.8"/>
                    <circle cx="200" cy="110" r="23" fill="white" opacity="0.8"/>
                    <circle cx="260" cy="85" r="18" fill="white" opacity="0.8"/>
                    <circle cx="320" cy="105" r="22" fill="white" opacity="0.8"/>

                    <!-- Connecting ribbons (alpha helices/beta sheets) -->
                    <path d="M 80 100 Q 110 85 140 70 Q 170 90 200 110 Q 230 95 260 85 Q 290 95 320 105"
                          stroke="white" stroke-width="6" fill="none" opacity="0.6"/>

                    <!-- Additional secondary structure -->
                    <path d="M 90 120 L 130 95 L 170 130 L 210 100 L 250 115 L 290 95 L 330 120"
                          stroke="white" stroke-width="3" fill="none" stroke-dasharray="5,5" opacity="0.5"/>
                </g>

                <!-- Decorative molecules -->
                <g opacity="0.3">
                    <circle cx="50" cy="50" r="8" fill="white"/>
                    <circle cx="350" cy="160" r="10" fill="white"/>
                    <circle cx="370" cy="40" r="6" fill="white"/>
                </g>
            </svg>
        </div>
        <div class="project-content">
            <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
            <p>{{ .Summary }}</p>
            <div class="project-tags">
                <span class="project-tag">Computational Biology</span>
                <span class="project-tag">Research</span>
            </div>
            <a href="{{ .Permalink }}" class="button" style="margin-top: 0.5rem;">Read more →</a>
        </div>
    </div>
    {{ end }}
</div>

{{ end }}

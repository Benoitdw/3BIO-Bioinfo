  - name: "Benoît DE WITTE"
    role: "PhD Student"
    email: "benoit.de.witte@ulb.be"
    bio: "Hello, I'm Benoît ! Passionate about computer science and biology since my youngest age, I chose to pursue a career in the dynamic field of bioinformatics. After completing a bachelor's degree in biomedical studies at the University of Namur, I went on to earn a master's degree in Biomedical Data Management at the University of Liège. Following my studies, I directly started working at OncoDNA, a company that provides personalized treatment solutions for cancer patients. After three years in industry, in 2024, I decided to focus on research and embark on a doctoral adventure. \n I'm currently working on the vertical Ionisation Potential (vIP) and just published [[cite:benaroua_alterations_2025:my first article]] on this subject. \n See  [[poster:dewitte2026televie:the poster]] I presented in Televie 2026 conference for resume of this article."
    research_interests: ["Genomics", "Cancer", "vIP", "Evolution"]
    linkedin: "https://www.linkedin.com/in/beno%C3%AEt-de-witte-05202b170/"
    orcid: ""
    photo: "/images/team/benoit_de_witte.png"
    github: "https://github.com/Benoitdw"

  - name: "Pauline HERMANS"
    role: "PhD Student"
    email: "pauline.hermans@ulb.be"
    photo: "/images/team/pauline_hermans.jpeg"
    bio: "I am a PhD candidate in computational and structural biology, working at the interface of bioinformatics, protein engineering, and mRNA vaccine development. My research combines machine learning and biophysical modeling approaches to better understand and predict the impact of mutations on proteins. In particular, I have developed and benchmarked machine learning models for predicting protein stability changes upon mutation (ΔΔG), contributing to the advancement of computational tools in protein design. I apply these models to guide the engineering of RNA polymerases, with the aim of improving in vitro transcription (IVT) processes and enhancing mRNA quality for vaccine applications."
    research_interests: ["Protein engineering", "Machine learning", "Structural bioinformatics", "Mutational modeling", "mRNA technologies"]
    linkedin: "https://www.linkedin.com/in/pauline-hermans/"
    orcid: "https://orcid.org/0009-0008-9398-9992"
    google_scholar: "https://scholar.google.com/citations?user=l_Bc0G8AAAAJ&hl=fr&inst=15752104956529846084"


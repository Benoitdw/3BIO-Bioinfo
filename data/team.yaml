  - name: "Wafa MOKHTARI"
    role: "PhD Student"
    email: "wafa.mokhtari@ulb.be"
    bio: "Hello, I'm Wafa! I am a veterinary doctor with a Master's in Microbial Biotechnology, and I discovered bioinformatics during my PhD as a natural extension of my interest in food safety and public health. My background in agri-food sciences gave me an early appreciation for the complexity of allergen biology questions that, I found, lend themselves well to computational approaches. I am currently pursuing a PhD in Bioinformatics jointly between the Université libre de Bruxelles and the University M'Hamed Bougara of Boumerdès, Algeria, where my work centers on food allergen prediction through a One Health lens. My main research focus is the development of a new allergenicity prediction tool, with direct applications in food safety assessment and risk management. As part of this work, I built and maintain [[cite:mokhtari_2026_FADComprehensiveDatabase: FAD]] ([[poster:mokhtari2025FAO:poster here]]), a database dedicated to food allergen data, designed to support both research and regulatory use. FAD  It is freely available at http://babylone.ulb.ac.be/faddatabase/.  I am also conducting a large-scale critical evaluation of sequence, structure, and language-model-based predictors, with the goal of identifying where current methods succeed and where they fall short under realistic, bias-controlled conditions."
    research_interests: ["Food allergen prediction", "Allergenicity benchmarking", "Protein sequence and structure analysis", "Bioinformatics databases", "One Health", "Food safety assessment"]
    linkedin: "https://www.linkedin.com/in/wafa-mokhtari-alg/"
    orcid: "https://orcid.org/my-orcid?orcid=0009-0003-2828-2011"
    github: "https://github.com/Wafamokh"
    photo: "/images/team/wafa_mokhtari.png"



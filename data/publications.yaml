- key: attanasio_soulmusic_2025
  title: SOuLMuSiC, a novel tool for predicting the impact of mutations on protein solubility
  authors: Attanasio S., Kwasigroch J., Rooman M., Pucci F.
  year: 2025
  venue: Scientific Reports
  volume: 15(1)
  pages: '27531'
  doi: 10.1038/s41598-025-11326-x
  pdf: ''
  abstract: 'Protein solubility problems arise in a wide range of applications, from antibody development to enzyme production,
    and are linked to several major disorders, including cataracts and Alzheimer’s diseases. To assist scientists in designing
    proteins with improved solubility and better understand solubility-related diseases, we introduce SOuLMuSiC, a computational
    tool for the fast and accurate prediction of the impact of single-site mutations on protein solubility. Our model is based
    on a simple artificial neural network that takes as input a series of features, including biophysical properties of wild-type
    and mutated residues, energetic values computed using various statistical potentials, and mutational scores derived from
    protein language models. SOuLMuSiC has been trained on a curated dataset of about 700 single-site mutations with known
    solubility values, collected and manually verified from original literature. It significantly outperforms current state-of-the-art
    predictors in strict cross validation: the Spearman correlation reaches 0.5 when solubility changes are represented categorically;
    for the subset with quantitative values, it increases to 0.7. SOuLMuSiC also shows good performance on external datasets
    containing high-throughput enzyme solubility-related data as well as protein aggregation propensities. In summary, SOuLMuSiC
    is a valuable tool for identifying mutations that impact protein solubility, and can play a major role in the rational
    design of proteins with improved solubility and in understanding genetic variants’ effect. It is freely available for
    academic use at http://babylone.ulb.ac.be/SoulMuSiC/.'
- key: benaroua_alterations_2025
  title: Alterations in the renin-angiotensin system during septic shock
  authors: Benaroua C., Pucci F., Rooman M., Picod A., Favory R., Legrand M., Vincent J., Creteur J., Taccone F.S., Annoni
    F., Garcia B.
  year: 2025
  venue: Annals of Intensive Care
  volume: 15(1)
  pages: '40'
  doi: 10.1186/s13613-025-01463-x
  pdf: ''
  abstract: 'BACKGROUND: Alterations in the classical Renin-Angiotensin Aldosterone System (RAAS) have been described during
    septic shock and are associated with patient outcomes. Since the alternative RAAS has also been reported to be altered
    in critically ill patients, and given that the RAAS can be modulated by specific therapeutics, such as angiotensin II,
    understanding its pathophysiology is of primary interest.

    OBJECTIVE: To describe the alterations in the classical and alternative RAAS during septic shock in comparison with healthy
    controls.

    METHODS: This prospective, monocentric, controlled study enrolled 20 patients fulfilling the septic shock diagnosis, as
    defined by the Sepsis-3 criteria, along with 30 controls. The main exclusion criteria were the use of any prior medication
    modifying the RAAS, prior liver failure (Child-Pugh score \textgreater 9), or chronic kidney disease (estimated glomerular
    filtration rate \textless 30 ml/min/1.73 m²). Equilibrium concentrations of RAAS peptides were analyzed using a liquid
    chromatography-mass spectrometry method from heparinized plasma. Circulating angiotensin-converting enzyme (cACE), cACE
    type 2 (cACE2) activities, and circulating dipeptidyl peptidase 3 (cDPP3) concentrations were assessed. Values were measured
    at diagnosis, 6 h after diagnosis and on days 1 and 3. The main timepoint of interest was 6 h after diagnosis. Values
    6 h after diagnosis were compared to 30 controls.

    RESULTS: In septic shock patients, increased concentrations of the main peptides of the classical and alternative RAAS
    were observed compared to controls, particularly angiotensin I (Ang I) and angiotensin-(1-7) (Ang-(1-7)). Additionally,
    there was a significant increase in the Ang I/Ang II ratio (1.16 [0.74-3.31] vs. 0.34 [0.25-0.43], p \textless 0.05) and
    the Ang-(1-7)/Ang II ratio (0.15 [0.08-1.30] vs. 0.03 [0.02-0.04], p \textless 0.05). We also observed a significant reduction
    in cACE activity (3.38 [2.29-6.8] vs. 7.89 [6.39-9.05] nmol Ang II/L/h), an increase in cACE2 activity (814 [669-1987]
    vs. 214 [132-293] pmol Ang-(1-7)/L/h), and increased cDPP3 concentrations (54.6 [35-142.2] ng/mL vs. 13.7 [11.9-15.4]
    ng/mL, all p \textless 0.05).

    CONCLUSIONS: Septic shock was associated with increased Ang I/Ang II and Ang-(1-7)/Ang II ratios, along with reduced cACE
    activity, increased cACE2 activity, and elevated cDPP3 concentrations compared to healthy controls.'
- key: cia_abagym_2025
  title: 'AbAgym: a well-curated dataset for the mutational analysis of antibody–antigen complexes'
  authors: Cia G., Li D., Poblete S., Rooman M., Pucci F.
  year: 2025
  venue: mAbs
  volume: 17(1)
  pages: '2592421'
  doi: 10.1080/19420862.2025.2592421
  pdf: ''
  abstract: With monoclonal antibodies becoming one of the largest classes of biopharmaceuticals, it is important to have
    curated data to train computational models that can accelerate their design. Despite the massive amount of mutagenesis
    data generated on antibody–antigen interactions, only a few small, well-curated datasets are available. This paper introduces
    AbAgym, a manually curated repository comprising approximately 324k mutations in antibody–antigen complexes, including
    approximately 10% of interface mutations, whose effects on antibody–antigen binding have been experimentally quantified
    through deep mutational scanning (DMS) experiments. We collected and curated 68 DMS datasets from the literature together
    with the three-dimensional structure of each antibody–antigen complex. We benchmarked the performance of established force
    field methods as well as recent machine learning models that predict the change in binding affinity upon mutation. The
    former achieved modest performance, whereas the latter performed only marginally better than random. Finally, our analysis
    of hotspot residues responsible for immune evasion highlights the importance of accounting for biological complexities,
    such as conformational changes or oligomeric states that influence antibody–antigen binding, which are often overlooked.
    Abagym is freely available for academic use at https://github.com/3BioCompBio/Abagym.
- key: tsishyn_residue_2025
  title: Residue conservation and solvent accessibility are (almost) all you need for predicting mutational effects in proteins
  authors: Tsishyn M., Hermans P., Rooman M., Pucci F.
  year: 2025
  venue: Bioinformatics
  volume: 41(6)
  pages: btaf322
  doi: 10.1093/bioinformatics/btaf322
  pdf: '/publications/tsishyn_residue_2025.pdf'
  abstract: Predicting how mutations impact protein biophysical properties remains a significant challenge in computational
    biology. In recent years, numerous predictors, primarily deep learning models, have been developed to address this problem;
    however, issues such as their lack of interpretability and limited accuracy persist.We showed that a simple evolutionary
    score, based on the log-odd ratio of wild-type and mutated residue frequencies in evolutionary related proteins, when
    scaled by the residue’s relative solvent accessibility, performs on par with or slightly outperforms most of the benchmarked
    predictors, many of which are considerably more complex. The evaluation is performed on mutations from the ProteinGym
    deep mutational scanning dataset collection, which measures various properties such as stability, activity or fitness.
    This raises further questions about what these complex models actually learn and highlights their limitations in addressing
    prediction of mutational landscape.The RSALOR model is available as a user-friendly Python package that can be installed
    from the PyPI repository. The code is freely available at https://github.com/3BioCompBio/RSALOR.
- key: li_prediction_2024
  title: Prediction of Paratope-Epitope Pairs Using Convolutional Neural Networks
  authors: Li D., Pucci F., Rooman M.
  year: 2024
  venue: International Journal of Molecular Sciences
  volume: 25(10)
  pages: '5434'
  doi: 10.3390/ijms25105434
  pdf: ''
  abstract: Antibodies play a central role in the adaptive immune response of vertebrates through the specific recognition
    of exogenous or endogenous antigens. The rational design of antibodies has a wide range of biotechnological and medical
    applications, such as in disease diagnosis and treatment. However, there are currently no reliable methods for predicting
    the antibodies that recognize a specific antigen region (or epitope) and, conversely, epitopes that recognize the binding
    region of a given antibody (or paratope). To fill this gap, we developed ImaPEp, a machine learning-based tool for predicting
    the binding probability of paratope-epitope pairs, where the epitope and paratope patches were simplified into interacting
    two-dimensional patches, which were colored according to the values of selected features, and pixelated. The specific
    recognition of an epitope image by a paratope image was achieved by using a convolutional neural network-based model,
    which was trained on a set of two-dimensional paratope-epitope images derived from experimental structures of antibody-antigen
    complexes. Our method achieves good performances in terms of cross-validation with a balanced accuracy of 0.8. Finally,
    we showcase examples of application of ImaPep, including extensive screening of large libraries to identify paratope candidates
    that bind to a selected epitope, and rescoring and refining antibody-antigen docking poses.
- key: tsishyn_fitmusic_2024
  title: 'FiTMuSiC: leveraging structural and (co)evolutionary data for protein fitness prediction'
  authors: Tsishyn M., Cia G., Hermans P., Kwasigroch J., Rooman M., Pucci F.
  year: 2024
  venue: Human Genomics
  volume: '18'
  pages: '36'
  doi: 10.1186/s40246-024-00605-9
  pdf: '/posters/dewitte2026televie.pdf'
  abstract: 'Systematically predicting the effects of mutations on protein fitness is essential for the understanding of genetic
    diseases. Indeed, predictions complement experimental efforts in analyzing how variants lead to dysfunctional proteins
    that in turn can cause diseases. Here we present our new fitness predictor, FiTMuSiC, which leverages structural, evolutionary
    and coevolutionary information. We show that FiTMuSiC predicts fitness with high accuracy despite the simplicity of its
    underlying model: it was among the top predictors on the hydroxymethylbilane synthase (HMBS) target of the sixth round
    of the Critical Assessment of Genome Interpretation challenge (CAGI6) and performs as well as much more complex deep learning
    models such as AlphaMissense. To further demonstrate FiTMuSiC’s robustness, we compared its predictions with in vitro
    activity data on HMBS, variant fitness data on human glucokinase (GCK), and variant deleteriousness data on HMBS and GCK.
    These analyses further confirm FiTMuSiC’s qualities and accuracy, which compare favorably with those of other predictors.
    Additionally, FiTMuSiC returns two scores that separately describe the functional and structural effects of the variant,
    thus providing mechanistic insight into why the variant leads to fitness loss or gain. We also provide an easy-to-use
    webserver at https://babylone.ulb.ac.be/FiTMuSiC, which is freely available for academic use and does not require any
    bioinformatics expertise, which simplifies the accessibility of our tool for the entire scientific community.'

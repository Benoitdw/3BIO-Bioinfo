tools:
  - name: "PoPMuSiC"
    description: "PoPMuSiC is a tool for the computer-aided design of mutant proteins with controlled thermodynamic stability properties. It evaluates the changes in folding free energy of a given protein or peptide under point mutations, on the basis of the experimental or modeled protein structure."
    image: ""                  # e.g. /images/software/popmusic.png
    url: "http://dezyme.com/"
    documentation: ""
    publication_doi: ""        # DOI only, e.g. 10.1093/bioinformatics/btp465
    publication_link: ""       # full URL if no DOI
    status: "online"           # online | maintenance | offline

  - name: "HotMuSiC"
    description: "HOTMuSiC is a tool for the computer-aided design of mutant proteins with controlled thermal stability properties. It evaluates the changes in melting temperature of a given protein or peptide under point mutations, on the basis of the experimental or modeled protein structure."
    image: ""                  # e.g. /images/software/popmusic.png
    url: "http://dezyme.com/"
    documentation: ""
    publication_doi: ""        # DOI only, e.g. 10.1093/bioinformatics/btp465
